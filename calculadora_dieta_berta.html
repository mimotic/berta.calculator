<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Dieta Berta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Range input — pseudo-elementos no soportados por Tailwind */
    input[type=range] {
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(0,0,0,0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #1a1a18;
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body class="font-serif bg-[#f9f8f6] text-[#1a1a18] min-h-screen py-8 px-4">
<div class="max-w-[680px] mx-auto">

  <header class="mb-8">
    <h1 class="text-[22px] font-normal tracking-tight">Calculadora dieta Berta</h1>
    <p class="text-[13px] text-[#6b6b67] mt-1 font-mono">objetivo: 210 kcal · fósforo &lt;100mg · potasio 100–200mg</p>
  </header>

  <div class="bg-white border border-black/10 rounded-[10px] px-6 py-5 mb-4">
    <div class="text-[10px] font-bold tracking-widest uppercase text-[#6b6b67] mb-4 font-mono">Ingredientes</div>
    <div class="text-[11px] text-[#6b6b67] italic mb-1.5 font-serif">Hidratos</div>
    <div id="sliders-hc"></div>
    <div class="text-[11px] text-[#6b6b67] italic mt-3 mb-1.5 font-serif">Proteína</div>
    <div id="sliders-prot"></div>
    <div class="text-[11px] text-[#6b6b67] italic mt-3 mb-1.5 font-serif">Grasa</div>
    <div id="sliders-fat"></div>
  </div>

  <div class="bg-white border border-black/10 rounded-[10px] px-6 py-5 mb-4">
    <div class="text-[10px] font-bold tracking-widest uppercase text-[#6b6b67] mb-4 font-mono">Energía y macros</div>
    <div class="grid grid-cols-5 max-[520px]:grid-cols-3 gap-2" id="macros"></div>

    <hr class="border-0 border-t border-black/10 my-5">

    <div class="text-[10px] font-bold tracking-widest uppercase text-[#6b6b67] mb-4 font-mono">Minerales renales</div>
    <div class="grid grid-cols-3 max-[520px]:grid-cols-2 gap-2" id="minerals"></div>

    <div class="flex flex-col gap-[5px] mt-3" id="alerts"></div>
    <p class="text-[11px] text-[#6b6b67] mt-3 leading-relaxed italic font-serif">Fósforo y potasio calculados con reducción por hervido (~30%). Referencia renal canina orientativa: fósforo &lt;100mg/día, potasio 100–200mg/día.</p>
  </div>

</div>

<script>
const TARGET   = 210;
const FAT_MAX  = 5.0;
const PHOS_MAX = 100;
const POT_MIN  = 100;
const POT_MAX  = 200;

const ingredients = [
  { id:'patata',    label:'Patata cocida',       group:'hc',   val:100,  max:150, step:5,    isOil:false, kcal:77,  prot:2.0,  fat:0.1,  phos:40,  pot:328, carb:17.5 },
  { id:'arroz',     label:'Arroz blanco cocido', group:'hc',   val:0,  max:150, step:5,    isOil:false, kcal:130, prot:2.7,  fat:0.3,  phos:35,  pot:35,  carb:28.2 },
  { id:'calabacin', label:'Calabacín cocido',    group:'hc',   val:60,  max:150, step:5,    isOil:false, kcal:17,  prot:1.2,  fat:0.2,  phos:32,  pot:261, carb:3.1  },
  { id:'zanahoria', label:'Zanahoria cocida',    group:'hc',   val:20,  max:80,  step:5,    isOil:false, kcal:35,  prot:0.8,  fat:0.2,  phos:30,  pot:235, carb:7.9  },
  { id:'merluza',   label:'Merluza cocida',      group:'prot', val:70,  max:120, step:5,    isOil:false, kcal:77,  prot:15.8, fat:1.5,  phos:140, pot:302, carb:0    },
  { id:'pollo',     label:'Pollo cocido',        group:'prot', val:0,   max:120, step:5,    isOil:false, kcal:165, prot:31.0, fat:3.6,  phos:220, pot:256, carb:0    },
  { id:'clara',     label:'Clara de huevo',      group:'prot', val:35,  max:80,  step:5,    isOil:false, kcal:52,  prot:10.9, fat:0.2,  phos:15,  pot:163, carb:0.7  },
  { id:'yema',      label:'Yema de huevo',       group:'prot', val:5,   max:20,  step:1,    isOil:false, kcal:322, prot:15.9, fat:26.5, phos:390, pot:109, carb:3.6  },
  { id:'aceite',    label:'Aceite oliva (ml)',   group:'fat',  val:1,   max:5,   step:0.25, isOil:true,  kcal:884, prot:0,    fat:100,  phos:0,   pot:1,   carb:0    },
];

const state = {};
ingredients.forEach(i => state[i.id] = i.val);

function calc() {
  let kcal=0, prot=0, fat=0, carb=0, phos=0, pot=0;
  ingredients.forEach(ing => {
    const g = state[ing.id];
    kcal += (g/100)*ing.kcal;
    prot += (g/100)*ing.prot;
    fat  += (g/100)*ing.fat;
    carb += (g/100)*(ing.carb||0);
    phos += (g/100)*ing.phos;
    pot  += (g/100)*ing.pot;
  });
  return { kcal, prot, fat, carb, phos, pot };
}

function statHtml(sv, svColor, sl, barPct, barColor, barLabel) {
  const bar = barPct != null ? `
    <div class="h-[3px] rounded-sm bg-black/10 overflow-hidden mt-1.5">
      <div class="h-full rounded-sm transition-[width] duration-[250ms]" style="width:${barPct}%;background:${barColor}"></div>
    </div>
    <div class="text-[9px] text-[#6b6b67] mt-[3px] font-mono">${barLabel}</div>` : '';
  return `
    <div class="bg-[#f2f0ec] rounded-[6px] py-3 px-[0.6rem] text-center">
      <div class="text-[20px] font-mono font-bold leading-none" style="color:${svColor||'inherit'}">${sv}</div>
      <div class="text-[10px] text-[#6b6b67] mt-1 font-serif">${sl}</div>
      ${bar}
    </div>`;
}

function render() {
  const r = calc();
  const diffK = r.kcal - TARGET;
  const pct = Math.min(100, (r.kcal/TARGET)*100);
  const ck = Math.abs(diffK) <= 8 ? '#1D9E75' : diffK < 0 ? '#EF9F27' : '#E24B4A';

  const totalG = ingredients.reduce((s,i) => s + state[i.id], 0);

  document.getElementById('macros').innerHTML =
    statHtml(r.kcal.toFixed(1), ck, 'kcal', pct, ck, `obj. ${TARGET}`) +
    statHtml(r.prot.toFixed(1), null, 'proteína g', null, null, null) +
    statHtml(r.fat.toFixed(2), r.fat>FAT_MAX?'#E24B4A':null, 'grasa g', null, null, null) +
    statHtml(r.carb.toFixed(1), null, 'hidratos g', null, null, null) +
    statHtml(totalG.toFixed(0), null, 'peso total g', null, null, null);

  const cp  = r.phos > PHOS_MAX ? '#E24B4A' : r.phos > PHOS_MAX*0.85 ? '#EF9F27' : '#1D9E75';
  const ck2 = (r.pot >= POT_MIN && r.pot <= POT_MAX) ? '#1D9E75' : '#EF9F27';

  document.getElementById('minerals').innerHTML =
    statHtml(r.phos.toFixed(1), cp, 'fósforo mg', Math.min(100,(r.phos/PHOS_MAX)*100), cp, 'límite ~100mg') +
    statHtml(r.pot.toFixed(1), ck2, 'potasio mg', Math.min(100,(r.pot/POT_MAX)*100), ck2, 'rango 100–200') +
    statHtml(r.phos>0?(r.prot/r.phos*1000).toFixed(0):'—', null, 'ratio prot:P ×10', null, null, null);

  const alerts = [];
  if (Math.abs(diffK) <= 5)        alerts.push(['ok',     `✓ Calorías en objetivo (${r.kcal.toFixed(1)} kcal)`]);
  else if (diffK < 0)              alerts.push(['warn',   `Faltan ${Math.abs(diffK).toFixed(1)} kcal para llegar a ${TARGET}`]);
  else                             alerts.push(['danger', `${diffK.toFixed(1)} kcal por encima del objetivo`]);

  if (r.fat > FAT_MAX)             alerts.push(['danger', `Grasa ${r.fat.toFixed(2)}g — supera el límite de ${FAT_MAX}g`]);
  else                             alerts.push(['ok',     `✓ Grasa dentro del límite (${r.fat.toFixed(2)}g)`]);

  if (r.phos > PHOS_MAX)           alerts.push(['danger', `Fósforo ${r.phos.toFixed(1)}mg — supera el límite renal`]);
  else if (r.phos > PHOS_MAX*0.85) alerts.push(['warn',   `Fósforo ${r.phos.toFixed(1)}mg — cerca del límite`]);
  else                             alerts.push(['ok',     `✓ Fósforo controlado (${r.phos.toFixed(1)}mg)`]);

  if (r.pot < POT_MIN)             alerts.push(['warn',   `Potasio ${r.pot.toFixed(1)}mg — por debajo del rango`]);
  else if (r.pot > POT_MAX)        alerts.push(['warn',   `Potasio ${r.pot.toFixed(1)}mg — por encima del rango`]);
  else                             alerts.push(['ok',     `✓ Potasio en rango (${r.pot.toFixed(1)}mg)`]);

  const alertClasses = { ok: 'bg-[#e1f5ee] text-[#0f6e56]', warn: 'bg-[#faeeda] text-[#854f0b]', danger: 'bg-[#fcebeb] text-[#a32d2d]' };
  document.getElementById('alerts').innerHTML = alerts.map(([t,m]) =>
    `<div class="text-xs py-1.5 px-3 rounded-md font-serif ${alertClasses[t]}">${m}</div>`).join('');

  ingredients.forEach(ing => {
    const g = state[ing.id];
    const ni = document.getElementById('num_'+ing.id);
    const ki = document.getElementById('kcal_'+ing.id);
    if (ni) ni.textContent = ing.isOil ? g.toFixed(2)+' ml' : g+' g';
    if (ki) ki.textContent = ((g/100)*ing.kcal).toFixed(1)+'k';
  });
}

['hc','prot','fat'].forEach(group => {
  const container = document.getElementById('sliders-'+group);
  ingredients.filter(i => i.group === group).forEach(ing => {
    const div = document.createElement('div');
    div.className = 'flex items-center gap-[10px] mb-[10px]';
    div.innerHTML = `
      <label for="sl_${ing.id}" class="text-[13px] text-[#6b6b67] w-[165px] max-[520px]:w-[130px] shrink-0 font-serif">${ing.label}</label>
      <input type="range" id="sl_${ing.id}" class="flex-1" min="0" max="${ing.max}" step="${ing.step}" value="${ing.val}">
      <span class="w-14 text-right text-[13px] font-bold font-mono text-[#1a1a18]" id="num_${ing.id}"></span>
      <span class="w-11 text-right text-[11px] text-[#6b6b67] font-mono" id="kcal_${ing.id}"></span>
    `;
    container.appendChild(div);
    div.querySelector('input').addEventListener('input', e => {
      state[ing.id] = parseFloat(e.target.value);
      render();
    });
  });
});

render();
</script>
</body>
</html>
